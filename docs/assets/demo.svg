<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" font-family="Menlo, Consolas, monospace" font-size="14">
  <rect width="720" height="400" rx="10" fill="#101418"/>
  <circle cx="24" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="22" r="6" fill="#27c93f"/>
  <text x="360" y="27" fill="#8b949e" text-anchor="middle" font-size="12">reqmin — shrink an HTTP request to the parts that matter</text>
  <g fill="#c9d1d9">
    <text x="24" y="62"><tspan fill="#7ee787">$</tspan> reqmin copied.curl</text>
    <text x="24" y="90" fill="#8b949e">baseline: status 200 satisfies oracle (status == 200)</text>
    <text x="24" y="112" fill="#8b949e">items: <tspan fill="#c9d1d9">22 removable</tspan> (14 headers, 4 query params, 4 cookies)</text>
    <text x="24" y="134" fill="#8b949e">probes: 32 requests sent, 0 answered from cache</text>
    <text x="24" y="162">result: kept <tspan fill="#7ee787">2</tspan> of <tspan fill="#f85149">22</tspan> items</text>
    <text x="24" y="186">  <tspan fill="#7ee787">kept</tspan>     header  Authorization</text>
    <text x="24" y="208">  <tspan fill="#7ee787">kept</tspan>     query   user</text>
    <text x="24" y="236" fill="#f85149">  removed  20 items — Accept, Accept-Language, Cache-Control, Cookie ×4,</text>
    <text x="24" y="258" fill="#f85149">           DNT, Pragma, Referer, Sec-Fetch-*, User-Agent, session, tab, _ …</text>
    <text x="24" y="292"><tspan fill="#d2a8ff">curl</tspan> 'http://127.0.0.1:8641/api/orders?user=42' \</text>
    <text x="24" y="314">     -H <tspan fill="#e3b341">'Authorization: Bearer demo-token'</tspan></text>
    <text x="24" y="352" fill="#8b949e">ddmin delta debugging · headers, query, cookies, form, JSON keys</text>
    <text x="24" y="374" fill="#8b949e">memoized probes · request budget · exact byte-for-byte replay</text>
  </g>
</svg>
